<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDC Success Stories</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #f59e0b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      padding: 32px 40px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }
    .header-center { text-align: center; }
    header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; opacity: 0.85; font-size: 1rem; }

    .header-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .podium-wrap { display: flex; flex-direction: column; align-items: flex-start; }
    .podium-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.75; margin-bottom: 8px; }
    .podium { display: flex; align-items: flex-end; gap: 0; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.4)); }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .podium-name { font-size: 0.65rem; font-weight: 700; max-width: 72px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    .podium-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: #fff; border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 2px 8px rgba(0,0,0,0.45); }
    .podium-block { width: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-radius: 2px 2px 0 0; }
    .podium-num { font-size: 2rem; font-weight: 900; line-height: 1; font-family: Arial Black, sans-serif; }
    .podium-trophy { font-size: 1.1rem; line-height: 1; margin-bottom: 2px; }
    .podium-likes { font-size: 0.58rem; font-weight: 700; opacity: 0.8; margin-top: 3px; }
    .podium-block.p1 { height: 110px; background: linear-gradient(180deg,#f5f5f5 0%,#dde2e8 100%); border: 2px solid #c0c8d0; border-bottom: none; color: #3a3a3a; }
    .podium-block.p2 { height: 72px;  background: linear-gradient(180deg,#f5f5f5 0%,#dde2e8 100%); border: 2px solid #c0c8d0; border-bottom: none; color: #3a3a3a; }
    .podium-block.p3 { height: 52px;  background: linear-gradient(180deg,#f5f5f5 0%,#dde2e8 100%); border: 2px solid #c0c8d0; border-bottom: none; color: #3a3a3a; }
    .podium-base { display: block; height: 12px; width: 216px; background: linear-gradient(180deg,#dde2e8 0%,#b0bec5 100%); border-radius: 0 0 4px 4px; border: 2px solid #c0c8d0; border-top: none; }
    .podium-empty { font-size: 0.75rem; opacity: 0.55; font-style: italic; margin-top: 4px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: white; color: var(--primary); }
    .btn-primary:hover { background: #eef2ff; }
    .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.6); }
    .btn-outline:hover { background: rgba(255,255,255,0.15); }

    .stats-bar { display: flex; justify-content: center; gap: 32px; padding: 20px 24px; background: white; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--muted); }
    .stats-bar span strong { color: var(--text); font-size: 1.1rem; }

    .toolbar { max-width: 1100px; margin: 28px auto 0; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.18s; }
    .search-box:focus { border-color: var(--primary); }
    .filter-select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: white; cursor: pointer; outline: none; }
    .filter-select:focus { border-color: var(--primary); }

    .grid { max-width: 1100px; margin: 24px auto 48px; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .read-story-btn { background: none; border: none; color: var(--primary); font-size: 0.88rem; font-weight: 600; cursor: pointer; padding: 0; text-align: left; }
    .read-story-btn:hover { text-decoration: underline; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-title  { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .badge { flex-shrink: 0; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: #ede9fe; color: #6d28d9; }
    .badge.technology          { background: #dbeafe; color: #1d4ed8; }
    .badge.people              { background: #dcfce7; color: #15803d; }
    .badge.training-upskilling { background: #fef9c3; color: #854d0e; }
    .badge.sub-badge           { background: #f0fdf4; color: #166534; font-size: 0.68rem; }

    .card-story { font-size: 0.93rem; color: #374151; line-height: 1.65; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
    .author { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: white; }
    .author-name { font-weight: 600; font-size: 0.9rem; }
    .author-date { font-size: 0.78rem; color: var(--muted); }
    .likes-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; color: var(--muted); }
    .likes-btn:hover, .likes-btn.liked { border-color: #fb7185; color: #e11d48; background: #fff1f2; }
    .delete-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; font-size: 0.85rem; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .delete-btn:hover { border-color: #f87171; background: #fff1f2; }

    .empty { grid-column: 1 / -1; text-align: center; padding: 64px 24px; color: var(--muted); }
    .empty svg { opacity: 0.3; margin-bottom: 16px; }
    .empty p { font-size: 1.05rem; margin-bottom: 4px; color: var(--text); font-weight: 600; }
    .empty small { font-size: 0.9rem; }

    /* ── Detail page ─────────────────────────────── */
    #detailPage { display: none; max-width: 800px; margin: 0 auto; padding: 32px 24px 64px; }

    .back-btn { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; color: var(--primary); font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 28px; }
    .back-btn:hover { text-decoration: underline; }
    .detail-title { font-size: 1.9rem; font-weight: 800; line-height: 1.25; color: var(--text); margin-bottom: 14px; }
    .detail-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .detail-story { font-size: 1.05rem; color: #374151; line-height: 1.75; margin-bottom: 28px; }
    .detail-section { background: var(--bg); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 16px 18px; margin-bottom: 16px; }
    .detail-section .section-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary); margin-bottom: 6px; }
    .detail-section .section-text  { font-size: 0.97rem; color: #374151; line-height: 1.65; }
    .detail-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 24px; margin-top: 32px; border-top: 1px solid var(--border); }

    /* ── Modal ───────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: white; border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 32px; transform: translateY(16px); transition: transform 0.2s; }
    .overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .modal p.sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    input[type="text"], textarea, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.18s; width: 100%; }
    input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 120px; }
    .char-count { font-size: 0.78rem; color: var(--muted); text-align: right; margin-top: 2px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-submit { background: var(--primary); color: white; }
    .btn-submit:hover { background: var(--primary-hover); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 200; }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Gold shimmer on #1 podium ───────────────── */
    @keyframes goldShimmer {
      0%   { box-shadow: 0 0 8px 2px rgba(245,190,40,0.5), inset 0 0 8px rgba(255,220,80,0.2); }
      50%  { box-shadow: 0 0 22px 6px rgba(245,190,40,0.9), inset 0 0 16px rgba(255,220,80,0.4); }
      100% { box-shadow: 0 0 8px 2px rgba(245,190,40,0.5), inset 0 0 8px rgba(255,220,80,0.2); }
    }
    .podium-block.p1 { animation: goldShimmer 2s ease-in-out infinite; border-color: #f5be28 !important; }

    /* ── Story of the Week spotlight ─────────────── */
    .sotw-wrap { max-width: 1100px; margin: 28px auto 0; padding: 0 24px; }
    .sotw-card {
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 2px solid #f59e0b;
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }
    .sotw-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
      background-size: 200% 100%;
      animation: shimmerBar 2.5s linear infinite;
    }
    @keyframes shimmerBar {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sotw-icon { font-size: 2.8rem; line-height: 1; flex-shrink: 0; }
    .sotw-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: #b45309; margin-bottom: 6px; }
    .sotw-title { font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
    .sotw-excerpt { font-size: 0.9rem; color: #374151; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sotw-meta { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .sotw-author { font-size: 0.82rem; font-weight: 600; color: #92400e; }
    .sotw-likes { font-size: 0.82rem; color: #b45309; }

    /* ── Animated counters ───────────────────────── */
    .stats-bar strong { transition: none; }

    @media (max-width: 768px) {
      header { grid-template-columns: 1fr; text-align: center; padding: 24px 16px; gap: 16px; }
      .header-actions { align-items: center; flex-direction: row; justify-content: center; }
      .podium-wrap { align-items: center; }
      header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="podium-wrap">
    <div class="podium-title">Top Stories</div>
    <div class="podium" id="podium"></div>
  </div>
  <div class="header-center">
    <h1>&#127942; CDC Success Stories</h1>
    <p>Real people. Real wins. Inspire and be inspired.</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openModal()">+ Share Your Story</button>
    <button class="btn btn-outline" onclick="showMainView()">Browse Stories</button>
  </div>
</header>

<!-- Main view (grid + toolbar + stats) -->
<div id="mainView">
  <div class="stats-bar">
    <span><strong id="totalCount">0</strong> Stories</span>
    <span><strong id="totalLikes">0</strong> Likes</span>
    <span><strong id="categoryCount">0</strong> Categories</span>
  </div>
  <div class="sotw-wrap" id="sotwWrap" style="display:none">
    <div class="sotw-card">
      <div class="sotw-icon">&#127942;</div>
      <div style="flex:1;min-width:0">
        <div class="sotw-label">&#11088; Story of the Week</div>
        <div class="sotw-title" id="sotwTitle"></div>
        <div class="sotw-excerpt" id="sotwExcerpt"></div>
        <div class="sotw-meta">
          <div class="avatar" id="sotwAvatar" style="width:24px;height:24px;font-size:0.65rem"></div>
          <span class="sotw-author" id="sotwAuthor"></span>
          <span class="sotw-likes" id="sotwLikes"></span>
          <button class="read-story-btn" id="sotwBtn" style="margin-left:8px;color:#b45309">Read Story &#8594;</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-box" type="text" id="searchInput" placeholder="Search stories..." oninput="renderStories()" />
    <select class="filter-select" id="categoryFilter" onchange="renderStories()">
      <option value="">All Categories</option>
      <option value="technology">Technology</option>
      <option value="people">People</option>
      <option value="training-upskilling">Training &amp; UpSkilling</option>
    </select>
    <select class="filter-select" id="sortFilter" onchange="renderStories()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="likes">Most Liked</option>
    </select>
    <button class="btn btn-submit" onclick="exportToExcel()" style="padding:10px 18px;font-size:0.9rem;">&#11015; Export Excel</button>
  </div>
  <div class="grid" id="storiesGrid"></div>
</div>

<!-- Detail view -->
<div id="detailPage">
  <button class="back-btn" onclick="showMainView()">&#8592; Back to Stories</button>
  <div id="detailContent"></div>
</div>

<!-- Add Story Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <h2>Share Your Story</h2>
    <p class="sub">Your journey could inspire thousands of people.</p>
    <div class="form-group">
      <label for="inputName">Your Name *</label>
      <input type="text" id="inputName" placeholder="e.g. Alex Johnson" maxlength="60" />
    </div>
    <div class="form-group">
      <label for="inputTitle">Story Title *</label>
      <input type="text" id="inputTitle" placeholder="e.g. How I landed my dream job" maxlength="100" />
      <div class="char-count"><span id="titleCount">0</span>/100</div>
    </div>
    <div class="form-group">
      <label for="inputCategory">Category *</label>
      <select id="inputCategory">
        <option value="">Select a category</option>
        <option value="technology">Technology</option>
        <option value="people">People</option>
        <option value="training-upskilling">Training &amp; UpSkilling</option>
      </select>
    </div>
    <div class="form-group" id="subCategoryGroup" style="display:none">
      <label for="inputSubCategory">Sub-Category</label>
      <select id="inputSubCategory">
        <option value="">Select a sub-category</option>
        <optgroup id="sub-people" label="People" style="display:none">
          <option value="hiring-onboarding">Hiring &amp; Onboarding Improvements</option>
          <option value="employee-engagement">Employee Engagement Initiatives</option>
          <option value="diversity-inclusion">Diversity &amp; Inclusion Wins</option>
          <option value="team-collaboration">Team Collaboration Success</option>
          <option value="leadership-development">Leadership Development Stories</option>
          <option value="retention-attrition">Retention / Attrition Reduction</option>
          <option value="conflict-resolution">Conflict Resolution Outcomes</option>
        </optgroup>
        <optgroup id="sub-training" label="Training &amp; UpSkilling" style="display:none">
          <option value="leadership-mgmt-training">Leadership &amp; Management Training</option>
          <option value="technical-skills-training">Technical Skills Training</option>
          <option value="soft-skills-development">Soft Skills Development</option>
          <option value="digital-tools-training">Digital Tools &amp; Platform Training</option>
          <option value="certification-achievement">Professional Certification Achievement</option>
          <option value="compliance-regulatory">Compliance &amp; Regulatory Training</option>
          <option value="mentoring-coaching">Mentoring &amp; Coaching Program</option>
          <option value="elearning-selfpaced">E-Learning &amp; Self-Paced Programs</option>
          <option value="knowledge-transfer">Knowledge Transfer Initiative</option>
        </optgroup>
        <optgroup id="sub-technology" label="Technology" style="display:none">
          <option value="process-automation">Process Automation</option>
          <option value="ai-ml">AI &amp; Machine Learning</option>
          <option value="cloud-migration">Cloud Migration</option>
          <option value="cybersecurity">Cybersecurity</option>
          <option value="agile-devops">Agile / DevOps Adoption</option>
          <option value="platform-modernization">Platform Modernization</option>
          <option value="cost-optimization">Cost Optimization through Tech</option>
          <option value="performance-scalability">Performance &amp; Scalability Improvement</option>
          <option value="incident-management">Incident Management &amp; Resolution</option>
          <option value="problem-management">Problem Management &amp; Root Cause</option>
          <option value="disaster-recovery">Disaster Recovery Testing &amp; Implementation</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label for="inputStory">Your Story *</label>
      <textarea id="inputStory" placeholder="Tell us your success story..." maxlength="2000" oninput="updateStoryCount()"></textarea>
      <div class="char-count"><span id="storyCount">0</span>/2000</div>
    </div>
    <div class="form-group">
      <label for="inputHighlights">Execution Highlights</label>
      <textarea id="inputHighlights" placeholder="What key steps or actions did you take?" maxlength="1000"></textarea>
    </div>
    <div class="form-group">
      <label for="inputResults">Results &amp; Outcomes</label>
      <textarea id="inputResults" placeholder="What were the measurable results?" maxlength="1000"></textarea>
    </div>
    <div class="form-group">
      <label for="inputImpact">Business Impact</label>
      <textarea id="inputImpact" placeholder="How did this impact your business or team?" maxlength="1000"></textarea>
    </div>
    <div class="form-group">
      <label for="inputLearnings">Key Learnings</label>
      <textarea id="inputLearnings" placeholder="What lessons did you gain?" maxlength="1000"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-submit" onclick="submitStory()">Publish Story</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyN6xdFp4KID5Y-FgLduXDmPCYG0_r7JJHhpiqhUNqMmUAE9aJ1zRKnP7pAOYNlmBzb/exec';

  const AVATAR_COLORS = ['#4f46e5','#7c3aed','#db2777','#dc2626','#d97706','#059669','#0284c7','#0891b2','#65a30d','#9333ea'];

  var storiesCache = [];

  /* ── Utility ──────────────────────────────────── */
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function cap(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }
  function hashCode(str) { var h=0; for(var i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0; return Math.abs(h); }
  function avatarColor(name) { return AVATAR_COLORS[hashCode(name||'?') % AVATAR_COLORS.length]; }
  function initials(name) { return (name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase(); }
  function formatDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

  /* ── View switching ───────────────────────────── */
  function showMainView() {
    document.getElementById('detailPage').style.display = 'none';
    document.getElementById('mainView').style.display   = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showDetailView() {
    document.getElementById('mainView').style.display   = 'none';
    document.getElementById('detailPage').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── Open story detail ────────────────────────── */
  function openDetail(id) {
    var s = null;
    for (var i = 0; i < storiesCache.length; i++) {
      if (String(storiesCache[i].id) === String(id)) { s = storiesCache[i]; break; }
    }
    if (!s) return;

    var likedKey = 'liked_' + s.id;
    var isLiked  = localStorage.getItem(likedKey) === '1';

    var sectionsHtml = '';
    var pairs = [
      ['Execution Highlights', s.highlights],
      ['Results & Outcomes',   s.results],
      ['Business Impact',      s.impact],
      ['Key Learnings',        s.learnings]
    ];
    for (var j = 0; j < pairs.length; j++) {
      if (pairs[j][1]) {
        sectionsHtml += '<div class="detail-section">'
          + '<div class="section-label">' + pairs[j][0] + '</div>'
          + '<div class="section-text">'  + esc(pairs[j][1]) + '</div>'
          + '</div>';
      }
    }

    var html = ''
      + '<div class="detail-title">' + esc(s.title) + '</div>'
      + '<div class="detail-meta">'
      +   '<div class="avatar" style="background:' + avatarColor(s.name) + ';width:40px;height:40px;font-size:0.9rem">' + initials(s.name) + '</div>'
      +   '<div>'
      +     '<div style="font-weight:600">'                     + esc(s.name)       + '</div>'
      +     '<div style="font-size:0.8rem;color:var(--muted)">' + formatDate(s.date) + '</div>'
      +   '</div>'
      +   '<span class="badge ' + esc(s.category) + '" style="margin-left:8px">' + cap(s.category) + '</span>'
      +   (s.subCategory ? '<span class="badge sub-badge">' + esc(subCategoryLabel(s.subCategory)) + '</span>' : '')
      + '</div>'
      + '<div class="detail-story">' + esc(s.story) + '</div>'
      + sectionsHtml
      + '<div class="detail-footer">'
      +   '<button class="likes-btn' + (isLiked ? ' liked' : '') + '" id="detail-like-btn" onclick="toggleLike(\'' + esc(s.id) + '\',this)">&#9829; <span>' + (s.likes||0) + '</span></button>'
      +   '<button class="delete-btn" onclick="deleteStory(\'' + esc(s.id) + '\')">&#128465; Delete</button>'
      + '</div>';

    document.getElementById('detailContent').innerHTML = html;
    showDetailView();
  }

  /* ── Data loading ─────────────────────────────── */
  function loadStories() {
    document.getElementById('storiesGrid').innerHTML = '<div class="empty"><p style="color:var(--muted)">Loading stories...</p></div>';
    fetch(SCRIPT_URL + '?action=get', { redirect: 'follow' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        storiesCache = data.stories || [];
        renderStories();
        updateStats();
        renderPodium();
        renderSotw();
      })
      .catch(function() {
        showToast('Could not load stories from server.');
        storiesCache = [];
        renderStories();
      });
  }

  function scriptPost(params) {
    var form = new FormData();
    Object.keys(params).forEach(function(k) { form.append(k, params[k] != null ? params[k] : ''); });
    return fetch(SCRIPT_URL, { method: 'POST', body: form, redirect: 'follow', mode: 'no-cors' });
  }

  /* ── Render grid ──────────────────────────────── */
  function renderStories() {
    var stories = storiesCache.slice();
    var search   = document.getElementById('searchInput').value.toLowerCase();
    var category = document.getElementById('categoryFilter').value;
    var sort     = document.getElementById('sortFilter').value;

    if (search) stories = stories.filter(function(s) {
      return (s.title||'').toLowerCase().indexOf(search) >= 0 ||
             (s.story||'').toLowerCase().indexOf(search) >= 0 ||
             (s.name||'').toLowerCase().indexOf(search) >= 0;
    });
    if (category) stories = stories.filter(function(s) { return s.category === category; });

    if (sort === 'newest') stories.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
    if (sort === 'oldest') stories.sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    if (sort === 'likes')  stories.sort(function(a,b){ return (b.likes||0)-(a.likes||0); });

    var grid = document.getElementById('storiesGrid');
    if (!stories.length) {
      grid.innerHTML = '<div class="empty"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>No stories found</p><small>Be the first to share your success story!</small></div>';
      return;
    }
    grid.innerHTML = stories.map(function(s) { return cardHTML(s); }).join('');
    updateStats();
  }

  function cardHTML(s) {
    var likedKey = 'liked_' + s.id;
    var isLiked  = localStorage.getItem(likedKey) === '1';
    var sid = s.id;
    return '<div class="card">'
      + '<div class="card-header">'
      +   '<div class="card-title">' + esc(s.title) + '</div>'
      +   '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
      +     '<span class="badge ' + esc(s.category) + '">' + cap(s.category) + '</span>'
      +     (s.subCategory ? '<span class="badge sub-badge">' + esc(subCategoryLabel(s.subCategory)) + '</span>' : '')
      +   '</div>'
      + '</div>'
      + '<div class="card-story">' + esc(s.story) + '</div>'
      + '<button class="read-story-btn" onclick="openDetail(\'' + sid + '\')">Read Full Story &#8594;</button>'
      + '<div class="card-footer">'
      +   '<div class="author">'
      +     '<div class="avatar" style="background:' + avatarColor(s.name) + '">' + initials(s.name) + '</div>'
      +     '<div>'
      +       '<div class="author-name">' + esc(s.name) + '</div>'
      +       '<div class="author-date">' + formatDate(s.date) + '</div>'
      +     '</div>'
      +   '</div>'
      +   '<div style="display:flex;gap:8px;align-items:center">'
      +     '<button class="likes-btn ' + (isLiked ? 'liked' : '') + '" onclick="toggleLike(\'' + sid + '\',this)">&#9829; <span>' + (s.likes||0) + '</span></button>'
      +     '<button class="delete-btn" onclick="deleteStory(\'' + sid + '\')" title="Delete">&#128465;</button>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }

  /* ── Animated counter ────────────────────────── */
  function animateCount(el, target) {
    var start = 0;
    var duration = 1200;
    var step = Math.ceil(target / (duration / 16));
    var timer = setInterval(function() {
      start += step;
      if (start >= target) { start = target; clearInterval(timer); }
      el.textContent = start;
    }, 16);
  }

  /* ── Story of the Week ───────────────────────── */
  function renderSotw() {
    if (!storiesCache.length) return;
    var now = new Date();
    var weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
    var recent = storiesCache.filter(function(s) { return new Date(s.date) >= weekAgo; });
    var pool = recent.length ? recent : storiesCache;
    var best = pool.slice().sort(function(a,b){ return (b.likes||0)-(a.likes||0); })[0];
    if (!best) return;
    document.getElementById('sotwTitle').textContent   = best.title;
    document.getElementById('sotwExcerpt').textContent = best.story;
    document.getElementById('sotwAuthor').textContent  = best.name;
    document.getElementById('sotwLikes').textContent   = '&#9829; ' + (best.likes||0) + ' likes';
    document.getElementById('sotwLikes').innerHTML     = '&#9829; ' + (best.likes||0) + ' likes';
    var av = document.getElementById('sotwAvatar');
    av.textContent = initials(best.name);
    av.style.background = avatarColor(best.name);
    document.getElementById('sotwBtn').onclick = function() { openDetail(best.id); };
    document.getElementById('sotwWrap').style.display = 'block';
  }

  /* ── Stats & Podium ───────────────────────────── */
  function updateStats() {
    var totalStories = storiesCache.length;
    var totalLikes   = storiesCache.reduce(function(s,x){ return s+(x.likes||0); },0);
    var cats = {};
    storiesCache.forEach(function(s){ if(s.category) cats[s.category]=1; });
    var totalCats = Object.keys(cats).length;
    animateCount(document.getElementById('totalCount'),    totalStories);
    animateCount(document.getElementById('totalLikes'),    totalLikes);
    animateCount(document.getElementById('categoryCount'), totalCats);
  }

  function renderPodium() {
    var top = storiesCache.slice().sort(function(a,b){ return (b.likes||0)-(a.likes||0); }).slice(0,3);
    var el  = document.getElementById('podium');
    if (!el) return;
    if (!top.length) { el.innerHTML = '<span class="podium-empty">No stories yet</span>'; return; }
    var rankAtPos=[1,0,2], numAtPos=['2','1','3'], trophyAtPos=['&#x1F948;','&#x1F3C6;','&#x1F949;'], classAtPos=['p2','p1','p3'];
    var slots = rankAtPos.map(function(rankIdx,posIdx) {
      var s=top[rankIdx], num=numAtPos[posIdx], cls=classAtPos[posIdx], trp=trophyAtPos[posIdx];
      if (!s) return '<div class="podium-slot"><div class="podium-block '+cls+'"><div class="podium-num">'+num+'</div></div></div>';
      return '<div class="podium-slot">'
        +'<div class="podium-name">'+esc(s.name.split(' ')[0])+'</div>'
        +'<div class="podium-avatar" style="background:'+avatarColor(s.name)+'">'+initials(s.name)+'</div>'
        +'<div class="podium-block '+cls+'"><div class="podium-trophy">'+trp+'</div><div class="podium-num">'+num+'</div><div class="podium-likes">&#9829; '+(s.likes||0)+'</div></div>'
        +'</div>';
    }).join('');
    el.innerHTML = '<div><div style="display:flex;align-items:flex-end">'+slots+'</div><div class="podium-base"></div></div>';
  }

  /* ── Like / Delete ────────────────────────────── */
  function toggleLike(id, btn) {
    var likedKey = 'liked_' + id;
    var already  = localStorage.getItem(likedKey) === '1';
    var delta    = already ? -1 : 1;
    localStorage.setItem(likedKey, already ? '0' : '1');
    btn.classList.toggle('liked', !already);
    for (var i=0;i<storiesCache.length;i++) {
      if (String(storiesCache[i].id)===String(id)) {
        storiesCache[i].likes = (storiesCache[i].likes||0) + delta;
        btn.querySelector('span').textContent = storiesCache[i].likes;
        break;
      }
    }
    updateStats();
    renderPodium();
    scriptPost({ action:'like', id:id, delta:delta }).catch(function(){ showToast('Like could not be saved.'); });
  }

  function deleteStory(id) {
    if (!confirm('Delete this story? This cannot be undone.')) return;
    scriptPost({ action:'delete', id:id })
      .then(function() { showToast('Story deleted.'); setTimeout(loadStories, 1000); showMainView(); })
      .catch(function() { showToast('Delete failed. Please try again.'); });
  }

  /* ── Modal ───────────────────────────────
